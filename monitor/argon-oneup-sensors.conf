# Argon ONE UP Laptop — lm-sensors configuration (Raspberry Pi CM5)
# Install: sudo cp argon-oneup.conf /etc/sensors.d/

chip "cpu_thermal-virtual-*"
    label temp1 "CPU"

# RP1 south bridge die temperature and internal power rail ADC channels
chip "rp1_adc-isa-*"
    label temp1 "RP1"
    label in1   "1.8V Rail"
    label in2   "3.3V Rail"
    label in3   "1.5V Rail A"
    label in4   "1.5V Rail B"

# PWM control outputs are not sensors — hide them
chip "pwmfan-isa-*"
    label fan1 "CPU Fan"
    ignore pwm1
    ignore pwm1_enable

# Die 1/2 sensors carry an NVMe spec sentinel (65261°C) for their high limit;
# Composite already represents the drive's reported temperature
chip "nvme-pci-*"
    label temp1 "NVMe"
    ignore temp2
    ignore temp3

# Exposed by the oneUpPower kernel module (battery/ in this repo)
chip "BAT0-virtual-*"
    label in0   "Battery Voltage"
    label temp1 "Battery"

# BCM2712 PMIC under-voltage sticky alarm flag — no voltage input register
chip "rpi_volt-isa-*"
    ignore in0
